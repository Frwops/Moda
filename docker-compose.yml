services:
  mysql:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: moda
      MARIADB_USER: moda
      MARIADB_PASSWORD: moda
    ports:
      - "3306:3306"
    volumes:
      - moda_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moda_mysql_data:
